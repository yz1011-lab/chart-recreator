"<!DOCTYPE html>\n<html lang=\"zh-TW\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Chart Recreator \u2014 \u5716\u8868\u91cd\u88fd\u5de5\u5177</title>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js\"></script>\n<style>\n/* ===== RESET & BASE ===== */\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\n:root{\n  --bg:#f8f9fa;--surface:#fff;--border:#dee2e6;--text:#212529;--text-muted:#6c757d;\n  --primary:#2563eb;--primary-hover:#1d4ed8;--accent:#f59e0b;\n  --success:#10b981;--warning:#f59e0b;--error:#ef4444;--info:#3b82f6;\n  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);\n  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1);\n  --font-sans:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,\"Helvetica Neue\",Arial,sans-serif;\n  --font-mono:\"SF Mono\",\"Fira Code\",monospace;\n}\nhtml{font-size:15px}\nbody{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh}\n\n/* ===== LAYOUT ===== */\n.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}\n.app-header h1{font-size:1.25rem;font-weight:700;letter-spacing:-.02em}\n.app-header .subtitle{color:var(--text-muted);font-size:.85rem}\n.main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}\n\n/* ===== STEPPER ===== */\n.stepper{display:flex;gap:.5rem;margin-bottom:2rem;padding:0;list-style:none}\n.stepper li{flex:1;text-align:center;padding:.65rem .5rem;border-radius:var(--radius);font-size:.8rem;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);cursor:default;transition:all .2s}\n.stepper li.active{background:var(--primary);color:#fff;border-color:var(--primary)}\n.stepper li.done{background:#dbeafe;color:var(--primary);border-color:#93c5fd}\n\n/* ===== PANELS ===== */\n.panel{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow)}\n.panel.active{display:block}\n.panel h2{font-size:1.15rem;margin-bottom:1.25rem;font-weight:700}\n\n/* ===== UPLOAD ===== */\n.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .2s;position:relative}\n.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:#eff6ff}\n.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}\n.upload-zone .icon{font-size:2.5rem;margin-bottom:.75rem}\n.upload-zone p{color:var(--text-muted);font-size:.9rem}\n.upload-zone .formats{font-size:.75rem;color:var(--text-muted);margin-top:.5rem}\n.upload-preview{margin-top:1.5rem;text-align:center;display:none}\n.upload-preview img{max-width:100%;max-height:350px;border-radius:var(--radius);border:1px solid var(--border)}\n\n/* ===== CONFIG ROW ===== */\n.config-row{display:flex;gap:1rem;margin-top:1.5rem;align-items:flex-end;flex-wrap:wrap}\n.config-row label{font-size:.8rem;font-weight:600;display:block;margin-bottom:.35rem}\n.config-row select,.config-row input[type=text]{padding:.5rem .75rem;border:1px solid var(--border);border-radius:6px;font-size:.85rem;background:var(--surface)}\n.config-row input[type=text]{width:320px}\n\n/* ===== BUTTONS ===== */\n.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.3rem;border:none;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s}\n.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(---primary-hover)}\n.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}.btn-secondary:hover{background:#f1f5f9}\n.btn-succeess{background:var(--success);color:#fff}.btn-succeess:hover{background:#059669}\n.btn:disabled{opacity:.5;cursor:not-allowed}\n.btn-group{display:flex;gap:.75rem;margin-top:1.5rem;flex-wrap:wrap}\n\n/* ===== LOADI.NG ===== */\n.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}\n@keyframes spin{to{transform:rotate(360deg)}}\n.loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;border-radius:var(--radius);z-index:10;font-size:.9rzm;font-weight:600;color:var(--primary)}\n.loading-overlay .spinner{border-color:rgba(37,99,235,.2);border-top-color:var(--primary);width:32px;height:32px}\n\n/* ===== BADGE ===== */\n.badg{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.7rem;font-weight:700}\n.badge-success{background:#d1fae5;color:#065f46}\n.badge-warning{background:#fef3c7;color:#92400e}\n.badge-info{background:#dbeafe;color:#1e40af}\n.badge-error{background:#fee2e2;color:#991b1b}\n\n/* ===== DATA TABLE ===== */\n.data-table-wrap{overflow-x:auto;margin-top:1rem}\n.data-table{width:100%;border-collapse:collapse;font-size:.85rem}\n.data-table th,.data-table td{padding:.5rem .65rem;border:1px solid var(--border);text-align:left}\n.data-table th{background:#f1f5f9;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0}\n.data-table td input{width:100%;border:none;background:transparent;font-size:.85rem;padding:.15rem 0;font-family:var(--font-mono)}\n.data-table td input:focus{outline:none;background:#eff6ff}\n.data-table .row-actions{width:36px;text-align:center}\n.data-table .row-actions button{background:none;border:none;cursor:pointer;color:var(--error);font-size:1rem;padding:2px}\n\n/* ===== METADATA ===== */\n.meta-fields{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}\n.meta-fields .field label{display:block;font-size:.75rem;font-weight:600;margin-bottom:.3rem;color:var(--text-muted)}\n.meta-fields .field input{width:100%;padding:.45rem .6rem;border:1px solid var(--border);border-radius:6px;font-size:.85rem}\n.meta-fields .field.full{grid-column:1/-1}\n\n/* ===== CHART TYPE SELECT ===== */\n.chart-type-select{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}\n.chart-type-btn{padding:.45rem 1rem;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:.8rem;cursor:pointer;transition:all .15s;font-weight:500}\n.chart-type-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}\n\n/* ===== STYLE CARDS ===== */\n.style-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin-bottom:1.5rem}\n.style-card{border:2px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;transition:all .2s;position:relative}\n.style-card:hover{border-color:#93c5fd;box-shadow:var(--shadow)}\n.style-card.selected{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.15)}\n.style-card .swatch{height:48px;border-radius:6px;margin-bottom:.75rem;display:flex;align-items:center;justify-content:center;gap:4px;overflow:hidden}\n.style-card .swatch span{flex:1;height:100%;display:block}\n.style-card h3{font-size:.9rem;font-weight:700;margin-bottom:.25rem}\n.style-card p{font-size:.75rem;color:var(--text-muted);line-height:1.4}\n\n/* ===== PREVIEW ===== */\n.preview-container{position:relative;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1rem;min-height:350px}\n.preview-container canvas{width:100%!important;height:auto!important}\n\n/* ===== EXPORT OPTIONS ===== */\n.export-options{display:flex;gap:1.5rem;margin:1.5rem 0;flex-wrap:wrap;align-items:center}\n.export-options .opt-group{display:flex;flex-direction:column;gap:.3rem}\n.export-options .opt-group label{font-size:.75rem;font-weight:600;color:var(--text-muted)}\n.export-options .opt-group select{padding:.4rem .6rem;border:1px solid var(--border);border-radius:6px;font-size:================\nconst DEFAULT_SETTINGS = {\n  webhookUrl: 'https://shawnhuang.app.n8n.cloud/webhook/chart-analyze',\n  model: 'claude',\n  apiKey: '',\n};\nfunction loadSettings() {\n  try {\n    const saved = JSON.parse(localStorage.getItem('chartRecreatorSettings') || '{}');\n    const s = { ...DEFAULT_SETTINGS, ...saved };\n    document.getElementById('cfgWebhookUrl').value = s.webhookUrl;\n    if (s.model) document.getElementById('cfgModel').value = s.model;\n    if (s.apiKey) document.getElementById('cfgApiKey').value = s.apiKey;\n    if (s.model) document.getElementById('modelSelect').value = s.model;\n  } catch(e) {}\n}\nfunction saveSettings() {\n  const s = {\n    webhookUrl: document.getElementById('cfgWebhookUrl').value.trim(),\n    model: document.getElementById('cfgModel').value,\n    apiKey: document.getElementById('cfgApiKey').value.trim(),\n  };\n  localStorage.setItem('chartRecreatorSettings', JSON.stringify(s));\n  document.getElementById('modelSelect').value = s.model;\n  closeSettings();\n}\nfunction getSettings() {\n  try {\n    const saved = JSON.parse(localStorage.getItem('chartRecreatorSettings') || '{}');\n    return { ...DEFAULT_SETTINGS, ...saved };\n  } catch(e) { return { ...DEFAULT_SETTINGS }; }\n}\nfunction openSettings() {\n  document.getElementById('settingsModal').classList.add('open');\n  updateConnectionIndicator();\n}\nfunction closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }\ndocument.getElementById('settingsModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeSettings(); });\n\nfunction updateConnectionIndicator() {\n  const el = document.getElementById('connectionStatus');\n  const s = getSettings();\n  if (s.webhookUrl) {\n    el.innerHTML = `<div class=\"conn-status ok\">\u2705 \u5df2\u8a2d\u5b9a n8n Webhook\uff1a${s.webhookUrl.substring(0, 50)}...</div>`;\n  } else if (s.apiKey) {\n    el.innerHTML = `<div class=\"conn-status ok\">\u2705 \u5df2\u8a2d\u5b9   renderPreviewChart();\n    }\n  }\n  if (n === 3) {\n    if (isTable) {\n      document.getElementById('exportChartWrap').style.display = 'none';\n      document.getElementById('exportTableWrap').style.display = 'block';\n      document.getElementById('exportMainBtn').textContent = '\ud83d\udce5 \u4e0b\u8f09\u8868\u683c';\n      document.getElementById('exportMainBtn').onclick = exportTable;\n      document.getElementById('exportSvgBtn').style.display = 'none';\n      renderTablePreview('exportTablePreview');\n    } else {\n      document.getElementById('exportChartWrap').style.display = 'block';\n      document.getElementById('exportTableWrap').style.display = 'none';\n      document.getElementById('exportMainBtn').textContent = '\ud83d\udce5 \u4e0b\u8f09\u5716\u8868';\n      document.getElementById('exportMainBtn').onclick = () => exportChart();\n      document.getElementById('exportSvgBtn').style.display = '';\n      renderExportChart();\n    }\n  }\n}\n\n// ============================================================\n// FILE UPLOAD\n// ============================================================\nconst uploadZone = document.getElementById('uploadZone');\nconst fileInput = document.getElementById('fileInput');\n\nuploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });\nuploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));\nuploadZone.addEventListener('drop', e => {\n  e.preventDefault(); uploadZone.classList.remove('dragover');\n  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);\n});\nfileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });\n\nfunction handleFile(file) {\n  if (!file.type.startsWith('image/')) return showStatus('uploadStatus', '\u8acb\u4e0a\u50b3\u5716\u7247\u6a94\u6848', 'error');\n  if (file.size > 10 * 1024 * 1024) return showStatus('uploadStatus', '\u6a94\u6848\u5927\u5c0f\u8d85\u904e 10MB \u9650\u5236', 'error');\n\n  const reader = new FileReader();\n  reader.onload = e => {\n    STATE.imageBase64 = e.target.result.split(',')[1];\n    STATE.imageMime = file.type;\n    document.getElementById('previewImg').src = e.target.result;\n    document.getElementById('uploadPreview').style.display = 'block';\n    document.getElementById('uploadConfig').style.display = 'flex';\n    showStatus('uploadStatus', `\u5df2\u8f09\u5165: ${file.name} (${(file.size/1024).toFixed(0)} KB)`, 'success');\n  };\n  reader.readAsDataURL(file);\n}\n\n// ============================================================\n// AI ANALYSIS\n// ============================================================\nconst ANALYSIS_PROMPT = `\u4f60\u662f\u4e00\u500b\u5c08\u696d\u7684\u5716\u8868\u6578\u64da\u63d0\u53d6\u5c08\u5bb6\u3002\u8acb\u5206\u6790\u9019\u5f35\u5716\u7247\u4e26\u56de\u50b3 JSON \u683c\u5f0f\u7684\u7d50\u69cb\u5316\u6578\u64da\u3002\n\n\u9996\u5148\u5224\u65b7\u9019\u5f35\u5716\u7247\u662f\u300c\u5716\u300d(chart/graph) \u9084\u662f\u300c\u8868\u300d(table)\uff1a\n- \u300c\u5716\u300d\uff1a\u9577\u689d\u5716\u3001\u6298\u7dda\u5716\u3001\u5713\u9905\u5716\u3001\u6563\u9ede\u5716\u7b49\u8996\u89ba\u5316\u5716\u5f62\n- \u300c\u8868\u300d\uff1a\u4ee5\u884c\u5217\u683c\u5f0f\u5448\u73fe\u7684\u6578\u64da\u8868\u683c\uff08\u542b\u6587\u5b57\u8207\u6578\u5b57\uff09\n\n\u8acb\u56b4\u683c\u6309\u7167\u4ee5u4e0b JSON \u683c\u5f0f\u56de\u8986\uff08\u4e0d\u8981\u52a0 markdown code block\uff09\uff1a\n{\n  \"content_type\": \"chart|table\",\n  \"confidence\": \"high|medium|low|insufficient\",\n  \"confidence_reason\": \"\u8aaa\u660e\u6578\u64da\u63d0\u53d6\u7684\u53ef\u4fe1\u5ea6\u539f\u56e0\",\n  \"chart_type\": \"bar|line|pie|doughnut|area|scatter|horizontalBar|radar|stacked|table\",\n  \"title\": \"\u5716\u8868/\u8868\u683c\u6a19\u984c\",\n  \"x_label\": \"X\u8ef8\u540d\u7a31\uff08\u8868\u683c\u53ef\u7559\u7a7a\uff09\",\n  \"y_label\": \"Y\u8ef8\u540d\u7a31\uff08\u8868\u683c\u53ef\u7559\u7a7a\uff09\",\n  \"source\": \"\u8cc7\u6599\u4f86\u6e90\uff08\u5982\u53ef\u898b\uff09\",\n  \"unit\": \"\u6578\u503c\u55ae\u4f4d\",\n  \"description\": \"\u5716\u8868/\u8868\u683c\u6574\u9ad4\u63cf\u8ff0\u8207\u95dc\u9375\u767c\u73fe\",\n  \"labels\": [\"\u6b04\u4f4d\u6a19\u7c641\", \"\u6b04\u4f4d\u6a19\u7c642\", ...],\n  \"datasets\": [\n    {\n      \"name\": \"\u5217\u540d\u7a31/\u8cc7\u6599\u7cfb\u5217\u540d\u7a31\",\n      \"values\": [\u6578\u503c\u6216\u6587\u5b571, \u6578\u503c\u6216\u6587\u5b572, ...]\n    }\n  ]\n}\n\n\u5224\u65b7\u898f\u5247\uff1a\n- \u5982\u679c\u662f\u300c\u8868\u300d\uff0ccontent_type \u8a2d\u70ba \"table\"\uff0cchart_type \u8a2d\u70ba \"table\"\n- \u5982\u679c\u662f\u300c\u5716\u300d\uff0ccontent_type \u8a2d\u70ba \"chart\"\uff0cchart_type \u8a2d\u70ba\u5c0d\u61c9\u7684\u5716\u8868\u985e\u578b\n- \u8868\u683c\u7684 values \u53ef\u4ee5\u5305\u542b\u6587\u5b57\uff08\u5b57\u4e32\uff09\uff0c\u4e0d\u9650\u65bc\u6578\u5b57\n\n\u6578\u64da\u63d0\u53d6\u898f\u5247\uff1a\n1. \u5982\u679c\u6578\u503c\u6e05\u695a\u53ef\u8b80\uff0c\u76f4\u63a5\u63d0\u53d6\uff08confidence: \"high\"\uff09\n2. \u5982\u679c\u90e8\u5206\u6578\u503c\u6a21\u7cca\u4f46\u53ef\u5408\u7406\u63a8\u4f30\uff0c\u6a19\u8a18\u8fd1\u4f3c\uff08confidence: \"medium\"\uff09\n3. \u5982\u679c\u662f\u66f2\u7dda\u5716\u7b49\u96e3\u4ee5\u7cbe\u78ba\u8b80\u53d6\u7684\u985e\u578b\uff0c\u76e1\u53ef\u80fd\u5f9e\u8da8\u52e2\u63a8\u4f30\u4ee3\u8868\u6027\u6578\u64da\u9ede\uff08confidence: \"low\"\uff09\n4. \u5982\u679c\u5b8c\u5168\u7121\u6cd5\u8fa8\u8b58\u6216\u8cc7\u8a0a\u4e0d\u8db3\uff0c\u8a2d confidence: \"insufficient\"\n\n\u91cd\u8981\uff1a\u53ea\u56de\u50b3\u7d14 JSON\uff0c\u4e0d\u8981\u4efb\u4f55\u5176\u4ed6\u6587\u5b57\u3002`;\n\nasync function analyzeChart() {\n  if (!STATE.imageBase64) return;\n\n  const btn = document.getElementById('analyzeBtn');\n  btn.disabled = true;\n  btn.innerHTML = '<span class=\"spinner\"></span> \u5206\u6790\u4e2d...';\n  showStatus('uploadStatus', '\u6b63\u5728\u547c\u53eb AI \u5206\u6790\u5716\u8868...', 'info');\n\n  try {\n    const settings = getSettings();\n    const model = document.getElementById('modelSelect').value;\n    let result;\n\n    if (settings.webhookUrl) {\n      // n8n webhook proxy\n      result = await callN8nWebhook(settings.webhookUrl, model);\n    } else if (settings.apiKey) {\n      // Direct API call\n      if (model === 'claude') {\n        result = await callClaudeDirect(settings.apiKey);\n      } else {\n        result = await callGeminiDirect(settings.apiKey);\n      }\n    } else {\n      // Demo mode with sample data\n      result = getDemoData();\n      showStatus('uploadStatus', '\u26a0\ufe0f \u672a\u8a2d\u5b9a API \u9023\u7dda\uff0c\u4f7f\u7528\u793a\u7bc4\u6578\u64da\u3002\u8acb\u5728\u8a2d\u5b9a\u4e2d\u914d\u7f6e n8n webhook \u6216 API key\u3002', 'info');\n    }\n\n    STATE.chartData = result;\n    populateDataPanel(result);\n    goStep(1);\n  } catch (err) {\n    showStatus('uploadStatus', `\u5206\u6790\u5931\u6557: ${err.message}`, 'error');\n  } finally {\n    btn.disabled = false;\n    btn.innerHTML = '\ud83d\udd0d \u958b\u59cb\u5206\u6790';\n  }\n}\n\nasync function callN8nWebhook(url, model) {\n  const resp = await fetch(url, {\n    method: 'POST',\n    headers: { 'Content-Type': 'application/json' },\n    body: JSON.stringify({\n      image: STATE.imageBase64,\n      mime: STATE.imageMime,\n      model: model,\n      prompt: ANALYSIS_PROMPT,\n    }),\n  });\n  if (!resp.ok) {\n    const errText = await resp.text().catch(() => '');\n    throw new Error(`Webhook \u56de\u61c9\u932f\u8aa4 (${resp.status}): ${errText || resp.statusText}`);\n  }\n  const rawText = await resp.text();\n  if (!rawText || !rawText.trim()) {\n    throw new Error('Webhook \u56de\u50b3\u7a7a\u766d\u5167\u5bb9\uff0c\u8acb\u6aa2\u67e5 n8n workflow \u662f\u5426\u6b63\u78ba\u8a2d\u5b9a ' + model + ' \u6a21\u578b\u7684\u56de\u61c9');\n  }\n  let data;\n  try {\n    data = JSON.parse(rawText);\n  } catch (e) {\n    // Response might be wrapped in markdown code fence or have extra text\n    const jsonMatch = rawText.match(/```json?\\s*\\n?([\\s\\S]*?)\\n?\\s*```/);\n    if (jsonMatch) {\n      try { data = JSON.parse(jsonMatch[1]); } catch (_) {}\n    }\n    if (!data) {\n      // Try to find a JSON object in the raw text\n      const objMatch = rawText.match(/\\{[\\s\\S]*\\}/);\n      if (objMatch) {\n        try { data = JSON.parse(objMatch[0]); } catch (_) {}\n      }\n    }\n    if (!data) {\n      console.error('Webhook raw response:', rawText.substring(0, 500));\n      throw new Error('Webhook \u56de\u50b3\u975e JSON \u683c\u5f0f\u3002\u8acb\u6aa2\u67e5 n8n workflow \u7684 ' + model + ' \u8f38\u51fa\u7bc0\u9ede\u8a2d\u5b9a');\n    }\n  }\n  // Handle various response wrapper formats from n8n\n  if (typeof data === 'string') {\n    try { return JSON.parse(data); } catch (_) {\n      throw new Error('Webhook \u56de\u50b3\u5b57\u4e32\u7121\u6cd5\u89e3\u6790\u70ba JSON');\n    }\n  }\n  // n8n may wrap output in various keys\n  if (data.result) return typeof data.result === 'string' ? JSON.parse(data.result) : data.result;\n  if (data.output) return typeof data.output === 'string' ? JSON.parse(data.output) : data.output;\n  if (data.response) return typeof data.response === 'string' ? JSON.parse(data.response) : data.response;\n  if (data.text) {\n    // Gemini-style: n8n might return { text: \"...\" } with the AI respo\n    const text = data.text.trim();\n    try { return JSON.parse(text.replace(/^```json?\\n?/, '').replace(/\\n?```$/, '')); } catch (_) {\n      throw new Error('Webhook text \u6b04\u4f4d\u7121\u6cd5\u89e3\u6790\u70ba\u5716\u8868\u6578\u64da JSON');\n    }\n  }\n  // If data itself has chart structure keys, return it directly\n  if (data.chart_type || data.datasets || data.labels) return data;\n  // Last resort: check if it's an array with one item (n8n'sometimes wraps in array)\n  if (Array.isArray(data) && data.length > 0) {\n    const item = data[0];\n    if (item.result) return typeof item.result === 'string' ? JSON.parse(item.result) : item.result;\n    if (item.output) return typeof item.output === 'string' ? JSON.parse(item.output) : item.output;\n    if (item.text) {\n      const text = item.text.trim();\n      try { return JSON.parse(text.replace(/^```json?\\n?/, '').replace(/\\n?```$/, '')); } catch (_) {}\n    }\n    if (item.chart_type || item.datasets || item.labels) return item;\n  }\n  console.error('Webhook parsed data:', JSON.stringify(data).substring(0, 500));\n  throw new Error('\u7121\u6cd5\u5f9e Webhook \u56de\u61c9\u4e2d\u63d0\u53d6\u5716\u8868\u6578\u64da\uff0c\u8acb\u6aa2\u67e5 n8n workflow \u8f38\u51fa\u683c\u5f0f');\n}\n\nasync function callClaudeDirect(apiKey) {\n  const resp = await fetch('https://api.anthropic.com/v1/messages', {\n    method: 'POST',\n    headers: {\n      'Content-Type': 'application/json',\n      'x-api-key': apiKey,\n      'anthropic-version': '2023-06-01',\n      'anthropic-dangerous-direct-browser-access': 'true',\n    },\n    body: JSON.stringify({\n      model: 'claude-sonnet-4-20250514',\n      max_tokens: 4096,\n      messages: [{\n        role: 'user',\n        content: [\n          { type: 'image', source: { type: 'base64', media_type: STATE.imageMime, data: STATE.imageBase64 } },\n          { type: 'text', text: ANALYSIS_PROMPT },\n        ],\n      }],\n    }),\n  });\n  if (!resp.ok) { const e = await resp.text(); throw new Error(`Claude API \u932f\u8aa4: ${e}`); }\n  const data = await resp.json();\n  const text = data.content[0].text.trim();\n  return JSON.parse(text.replace(/^```json?\\n?/, '').replace(/\\n?```$/, ''));\n}\n\nasync function callGeminiDirect(apiKey) {\n  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {\n    method: 'POST',\n    headers: { 'Content-Type': 'application/json' },\n    body: JSON.stringify({\n      contents: [{\n        parts: [\n          { inline_data: { mime_type: STATE.imageMime, data: STATE.imageBase64 } },\n          { text: ANALYSIS_PROMPT },\n        ],\n      }],\n      generationConfig: { temperature: 0.1, maxOutputTokens: 4096 },\n    }),\n  });\n  if (!resp.ok) { const e = await resp.text(); throw new Error(`Gemini API \u932f\u8aa4: ${e}`); }\n  const data = await resp.json();\n  const text = data.candidates[0].content.parts[0].text.trim();\n  return JSON.parse(text.replace(/^```json?\\n?/, '').replace(/\\n?```$/, ''));\n}\n\nfunction getDemoData() {\n  return {\n    confidence: 'high',\n    confidence_reason: '\u793a\u7bc4\u6578\u64da \u2014 \u8acb\u8a2d\u5b9a API \u9023\u7dda\u4ee5\u5206\u6790\u771f\u5be6\u5716\u8868',\n    chart_type: 'bar',\n    title: 'Quarterly Revenue by Region',\n    x_label: 'Quarter',\n    y_label: 'Revenue (USD millions)',\n    source: 'Demo Data',\n    unit: 'USD millions',\n    description: '\u9019\u662f\u793a\u7bc4\u6578\u64da\uff0c\u5c55\u793a\u5404\u5b63\u5ea6\u5404\u5730\u5340\u71df\u6536\u3002\u8acb\u5728\u8a2d\u5b9a\u4e2d\u914d\u7f6e n8n webhook URL \u6216 API key \u4f86\u5206\u6790\u60a8\u81ea\u5df1\u7684\u5716\u8868\u3002',\n    labels: ['Q1', 'Q2', 'Q3', 'Q4'],\n    datasets: [\n      { name: 'APAC', values: [42, 58, 65, 72] },\n      { name: 'Europe', values: [35, 41, 48, 53] },\n      { name: 'Americas', values: [68, 75, 82, 91] },\n    ],\n  };\n}\n\n// ============================================================\n// DATA PANEL\n// ============================================================\nfunction populateDataPanel(data) {\n  // Determine content type\n  STATE.contentType = data.content_type === 'table' ? 'table' : 'chart';\n\n  // Confidence badge\n  const badgeEl = document.getElementById('confidenceBadge');\n  const badgeMap = {\n    high: ['\u2705 \u9ad8\u53ef\u4fe1\u5ea6\uff1a\u6578\u64da\u76f4\u63a5\u63d0\u53d6', 'badge-success'],\n    medium: ['\u2248 \u4e2d\u7b49\u53ef\u4fe1\u5ea6\uff1a\u90e8\u5206\u6578\u64da\u70ba\u8fd1\u4f3c\u503c', 'badge-warning'],\n    low: ['\ud83d\udd0d \u4f4e\u53ef\u4fe1\u5ea6\uff1a\u6578\u64da\u70ba\u63a8\u4f30\u503c\uff0c\u5efa\u8b70\u641c\u5c0b\u771f\u5be6\u6578\u64da\u9a57\u8b49', 'badge-info'],\n    insufficient: ['\u274c \u8cc7\u8a0a\u4e0d\u8db3\uff1a\u7121\u6cd5\u53ef\u9760\u63d0\u53d6\u6578\u64da', 'badge-error'],\n  };\n  const [txt, cls] = badgeMap[data.confidence] || badgeMap.medium;\n\n  // Content type indicator\n  const typeBadge = STATF.contentType === 'table'\n    ? '<span class=\"content-type-badge table\">\ud83d\udccb \u8868\u683c (Table)</span>'\n    : '<span class=\"content-type-badge chart\">\ud83d\udcca \u5716\u8868 (Chart)</span>';\n  badgeEl.innerHTML = typeBadge + ` <span class=\"badge ${cls}\">${txt}</span>`;\n  if (data.confidence_reason) {\n    badgeEl.innerHTML += `<div style=\"font-size:.8rem;color:var(--text-muted);margin-top:.35rem\">${data.confidence_reason}</div>`;\n  }\n\n  // Description\n  document.getElementById('chartDescription').textContent = data.description || '';\n\n  // Chart type select \u2014 only show for charts, hide for tables\n  const chartTypeWrap = document.getElementById('chartTypeSelect');\n  if (STATE.contentType === 'table') {\n    chartTypeWrap.style.display = 'none';\n    STATE.chartType = 'table';\n  } else {\n    chartTypeWrap.style.display = 'flex';\n    STATE.chartType = data.chart_type || 'bar';\n    renderChartTypeSelect();\n  }\n\n  // Meta fields \u2014 for tables, hide X/Y axis labels\n  document.getElementById('metaTitle').value = data.title || '';\n  document.getElementById('metaXLabel').value = data.x_label || '';\n  document.getElementById('metaYLabel').value = data.y_label || '';\n  document.getElementById('metaSource').value = data.source || '';\n  document.getElementById('metaUnit').value = data.unit || '';\n\n  const axisFields = document.querySelectorAll('#metaXLabel, #metaYLabel');\n  axisFields.forEach(f => {\n    f.closest('.field').style.display = STATE.contentType === 'table' ? 'none' : '';\n  });\n\n  // Update step 2 and 3 button text for tables\n  updateStepButtons();\n\n  // Data table\n  renderDataTable(data.labels, data.datasets);\n}\non selectChartType(type) {\n  STATE.chartType = type;\n  renderChartTypeSelect();\n}\n\nfunction renderDataTable(labels, datasets) {\n  if (!labels || !datasets) return;\n  const maxCols = Math.max(labels.length, ...datasets.map(d => d.values.length));\n  let html = '<table class=\"data-table\"><thead><tr><th></th>';\n  for (let i = 0; i < maxCols; i++) {\n    html += `<th><input value=\"${labels[i] || ''}\" onchange=\"updateLabel(${i}, this.value)\" style=\"font-weight:600\"></th>`;\n  }\n  html += '<th class=\"row-actions\"></th></tr></thead><tbody>';\n  datasets.forEach((ds, ri) => {\n    html += `<tr><td><input value=\"${ds.name || 'Series '+(ri+1)}\" onchange=\"updateSeriesName(${ri}, this.value)\" style=\"font-weight:600\"></td>`;\n    for (let ci = 0; ci < maxCols; ci++) {\n      html += `<td><input type=\"text\" value=\"${ds.values[ci] ?? ''}\" onchange=\"updateValue(${ri},${ci},this.value)\"></td>`;\n    }\n    html += `<td class=\"row-actions\"><button onclick=\"removeDataRow(${ri})\" title=\"\u522a\u9664\">\u2715</button></td></tr>`;\n  });\n  html += '</tbody></table>';\n  document.getElementById('dataTableWrap').innerHTML = html;\n}LES[style];\n  const meta = collectMeta();\n  const data = STATE.chartData;\n  if (!data) return null;\n\n  const type = getChartJsType();\n  const isPie = type === 'pie' || type === 'doughnut';\n  const isRadar = type === 'radar';\n  const isHorizontal = STATE.chartType === 'horizontalBar';\n  const isStacked = STATE.chartType === 'stacked';\n  const isArea = STATE.chartType === 'area';\n\n  const datasets = data.datasets.map((ds, i) => {\n    const color = s.colors[i % s.colors.length];\n    const cfg = {\n      label: ds.name,\n      data: isPie ? ds.values : ds.values,\n      backgroundColor: isPie ? s.colors.slice(0, ds.values.length) : (type === 'bar' ? color : color + '20'),\n      borderColor: color,\n      borderWidth: (type === 'line' || isArea || isRadar) ? (s.borderWidth || 2) : (s.borderWidth !== undefined ? s.borderWidth : 1),\n      pointRadius: type === 'scatter' ? 5 : (type === 'line' || isArea ? 3 : 0),\n      tension: 0.3,\n    };\n    if (isArea) { cfg.fill = true; cfg.backgroundColor = color + '30'; }\n    return cfg;\n  });\n\n  const config = {\n    type,\n    data: { labels: data.labels, datasets },\n    options: {\n      responsive: true,\n      maintainAspectRatio: false,\n      indexAxis: isHorizontal ? 'y' : 'x',\n      plugins: {\n        title: {\n          display: !!meta.title,\n          text: meta.title,\n          color: s.fontColor,\n          font: { ...s.titleFont, family: s.fontFamily },\n          padding: { bottom: 16 },\n        },\n        subtitle: {\n          display: !!meta.source,\n          text: meta.source,\n          color: s.fontColor + '99',\n          font: { size: 10, family: s.fontFamily },\n          padding: { bottom: 8 },\n        },\n        legend: {\n          display: data.datasets.length > 1 || isPie,\n          labels: { color: s.fontColor, font: { size: 11, family: s.fontFamily }, boxWidth: 12, padding: 16 },\n          position: isPie ? 'right' : 'top',\n        },\n        tooltip: {\n          backgroundColor: s.bg === '#1A1A2E' ? '#333' : '#fff',\n          titleColor: s.fontColor,\n          bodyColor: s.fontColor,\n          borderColor: s.gridColor,\n          borderWidth: 1,\n          callbacks: {\n            label: ctx => {\n              const val = ctx.parsed?.y ?? ctx.parsed ?? ctx.raw;\n              return ` ${ctx.dataset.label}: ${typeof val === 'number' ? val.toLocaleString() : val}${meta.unit ? ' ' + meta.unit : ''}`;\n            }\n          }\n        },\n      },\n      layout: { padding: { top: 8, right: 16, bottom: s.topBorder ? 4 : 8, left: 8 } },\n    },\n  };\n\n  // Data labels on chart (custom plugin approach)\n  if (STATE.showDataLabels && !isPie && !isRadar) {\n    // Will be handled by a custom plugin added in renderChart()\n    config._showDataLabels = true;\n    config._dataLabelColor = s.fontColor;\n    config._dataLabelFont = s.fontFamily;\n  }\n\n  if (!isPie && !isRadar) {\n    config.options.scales = {\n      x: {\n        title: { display: !!meta.xLabel, text: meta.xLabel, color: s.fontColor, font: { size: 11, family: s.fontFamily } },\n        ticks: { color: s.fontColor, font: { size: 10, family: s.fontFamily } },\n        grid: { color: s.gridColor, drawBorder: false },\n        stacked: isStacked,\n      },\n      y: {\n        title: { display: !!meta.yLabel, text: meta.yLabel, color: s.fontColor, font: { size: 11, family: s.fontFamily } },\n        ticks: { color: s.fontColor, font: { size: 10, family: s.fontFamily } },\n        grid: { color: s.gridColor, drawBorder: false },\n        stacked: isStacked,\n        beginAtZero: true,\n      },\n    };\n  }\n\n  return config;\n}\n' && STATE.exportInstance) { STATE.exportInstance.destroy(); STATE.exportInstance = null; }\n\n  const config = buildChartConfig(style, canvas.width, canvas.height);\n  if (!config) return;\n\n  // Custom plugin for background color\n  const bgPlugin = {\n    id: 'customBg',\n    beforeDraw: (chart) => {\n      const { ctx: c, chartArea } = chart;\n      c.save();\n      c.fillStyle = s.bg;\n      c.fillRect(0, 0, chart.width, chart.height);\n      // Top border for Economist style\n      if (s.topBorder) {\n        c.fillStyle = s.topBorder;\n        c.fillRect(0, 0, chart.width, 4);\n      }\n      c.restore();\n    }\n  };\n\n  config.plugins = [bgPlugin];\n\n  // Data labels plugin (shows values on chart bars/lines)\n  if (config._showDataLabels) {\n    const dlColor = config._dataLabelColor;\n    const dlFont = config._dataLabelFont;\n    config.plugins.push({\n      id: 'dataLabels',\n      afterDatasetsDraw: (chart) => {\n        const { ctx: c } = chart;\n        chart.data.datasets.forEach((dataset, di) => {\n          const meta = chart.getDatasetMeta(di);\n          if (!meta.hidden) {\n            meta.data.forEach((element, idx) => {\n              const val = dataset.data[idx];\n              if (val == null) return;\n              c.save();\n              c.fillStyle = dlColor;\n              c.font = `bold 10px ${dlFont}`;\n              c.textAlign = 'center';\n              const pos = element.tooltipPosition();\n              c.fillText(typeof val === 'number' ? val.toLocaleString() : val, pos.x, pos.y - 8);\n              c.restore();\n            });\n          }\n        });\n      }\n    });\n  }\n\n  const instance = new Chart(ctx, config);\n  if (canvasId === 'previewChart') STATE.chartInstance = instance;\n  if (canvasId === 'exportChart') STATE.exportInstance = instance;\n}\nlay:flex;gap:.75rem;margin-top:1.5rem;flex-wrap:wrap}\nfontFamily}`;\n    for (let i = 0; i < data.labels.length; i++) {\n      ctx.fillText(data.labels[i], padding + (i + 1) * cellW + 8, y + 24);\n    }\n    y += headerH;\n\n    // Data rows\n    data.datasets.forEach((ds, ri) => {\n      // Alternating row bg\n      if (ri % 2 === 1) {\n        ctx.fillStyle = s.bg === '#1A1A2E' ? '#151528' : '#f8f9fa';\n        ctx.fillRect(padding, y, cols * cellW, cellH);\n      }\n      // Row name\n      ctx.fillStyle = s.fontColor;\n      ctx.font = `bold 11px ${s.fontFamily}`;\n      ctx.fillText(ds.name, padding + 8, y + 22);\n      // Values\n      ctx.font = `11px ${s.fontFamily}`;\n      for (let ci = 0; ci < ds.values.length; ci++) {\n        ctx.fillText(String(ds.values[ci] != null ? ds.values[ci] : ''), padding + (ci + 1) * cellW + 8, y + 22);\n      }\n      // Row border\n      ctx.strokeStyle = s.gridColor;\n      ctx.beginPath();\n      ctx.moveTo(padding, y + cellH);\n      ctx.lineTo(padding + cols * cellW, y + cellH);\n      ctx.stroke();\n      y += cellH;\n    });\n\n    // Source\n    if (meta.source) {\n      ctx.fillStyle = s.fontColor + '99';\n      ctx.font = `10px ${s.fontFamily}`;\n      ctx.fillText(meta.source, padding, y + 16);\n    }\n\n    canvas.toBlob(blob => {\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url;\n      a.download = `table-${STATE.selectedStyle}.png`;\n      document.body.appendChild(a);\n      a.click();\n      document.body.removeChild(a);\n      URL.revokeObjectURL(url);\n    }, 'image/png');\n  }\ning the canvas data as base\n  // Chart.js doesn't natively support SVG, so we embed the high-res PNG in an SVG wrapper\n  const realW = w * dpi;\n  const realH = h * dpi;\n  const s = STYLES[STATE.selectedStyle];\n\n  const offCanvas = document.createElement('canvas');\n  offCanvas.width = realW;\n  offCanvas.height = realH;\n  const offCtx = offCanvas.getContext('2d');\n\n  const config = buildChartConfig(STATE.selectedStyle, realW, realH);\n  if (!config) return;\n  config.options.responsive = false;\n  config.options.animation = false;\n\n  const bgPlugin = {\n    id: 'customBg',\n    beforeDraw: (chart) => {\n      const c = chart.ctx;\n      c.save();\n      c.fillStyle = s.bg;\n      c.fillRect(0, 0, chart.width, chart.height);\n      if (s.topBorder) {\n        c.fillStyle = s.topBorder;\n        c.fillRect(0, 0, chart.width, 4 * dpi);\n      }\n      c.restore();\n    }\n  };\n  config.plugins = [bgPlugin];\n\n  const scaleFont = (f) => f ? { ...f, size: (f.size || 12) * dpi } : undefined;\n  if (config.options.plugins.title) config.options.plugins.title.font = scaleFont(config.options.plugins.title.font);\n  if (config.options.plugins.subtitle) config.options.plugins.subtitle.font = scaleFont(config.options.plugins.subtitle.font);\n  if (config.options.plugins.legend?.labels) config.options.plugins.legend.labels.font = scaleFont(config.options.plugins.legend.labels.font);\n  if (config.options.scales?.x) {\n    if (config.options.scales.x.title) config.options.scales.x.title.font = scaleFont(config.options.scales.x.title.font);\n    if (config.options.scales.x.ticks) config.options.scales.x.ticks.font = scaleFont(config.options.scales.x.ticks.font);\n  }\n  if (config.options.scales?.y) {\n    if (config.options.scales.y.title) config.options.scales.y.title.font = scaleFont(config.options.scales.y.title.font);\n    if (config.options.scales.y.ticks) config.options.scales.y.ticks.font = scaleFont(config.options.scales.y.ticks.font);\n  }\n\n  const tempChart = new Chart(offCtx, config);\n\n  setTimeout(() => {\n    const dataUrl = offCanvas.toDataURL('image/png');\n    tempChart.destroy();\n    const svg = `<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<svg xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" width=\"${w}\" height=\"${h}\" viewBox=\"0 0 ${realW} ${realH}\">\n  <image width=\"${realW}\" height=\"${realH}\" xlink:href=\"${dataUrl}\"/>\n</svg>`;\n    const blob = new Blob([svg], { type: 'image/svg+xml' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url;\n    a.download = `chart-${STATE.selectedStyle}-${w}x${h}.svg`;\n    document.body.appendChild(a);\n    a.click();\n    document.body.removeChild(a);\n    URL.revokeObjectURL(url);\n  }, 100);\n}\n\n// ============================================================\n// UTILS\n// ============================================================\nfunction showStatus(id, msg, type) {\n  const el = document.getElementById(id);\n  el.textContent = msg;\n  el.className = `status-msg show ${type}`;\n}\n\n// ============================================================\n// INIT\n// ============================================================\nloadSettings();\n</script>\n</body>\n</html>\n".85rem}\n\n/* ===== SETTINGS PANEL ===== */\n.settings-toggle{margin-left:auto;font-size:.8rem;color:var(--text-muted);cursor:pointer;padding:.4rem .8rem;border:1px solid var(--border);border-radius:6px;background:var(--surface)}\n.settings-toggle:hover{background:#f1f5f9}\n.settings-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);align-items:center;justify-content:center}\n.settings-modal.open{display:flex}\n.settings-modal .modal-body{background:var(--surface);border-radius:var(--radius);padding:2rem;width:90%;max-width:500px;box-shadow:var(--shadow-lg)}\n.settings-modal h2{font-size:1.1rem;margin-bottom:1rem}\n.settings-modal .field{margin-bottom:1rem}\n.settings-modal .field label{display:block;font-size:.8rem;font-weight:600;margin-bottom:.3rem}\n.settings-modal .field input,.settings-modal .field select{width:100%;padding:.5rem .7rem;border:1px solid var(--border);border-radius:6px;font-size:.85rem}\n.settings-modal .field .hint{font-size:.7rem;color:var(--text-muted);margin-top:.25rem}\n\n/* ===== STATUS MESSAGE ===== */\n.status-msg{padding:.75rem 1rem;border-radius:6px;font-size:.85rem;margin-top:1rem;display:none}\n.status-msg.show{display:block}\n.status-msg.error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}\n.status-msg.success{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}\n.status-msg.info{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}\n\n/* ===== CONNECTION STATUS ===== */\n.conn-status{padding:.5rem .75rem;border-radius:6px;font-size:.8rem;margin-top:.5rem}\n.conn-status.ok{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}\n.conn-status.fail{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}\n.conn-status.testing{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}\n\n/* ===== CONTENT TYPE INDICATOR ===== */\n.content-type-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .8rem;border-radius:20px;font-size:.8rem;font-weight:600;margin-bottom:.75rem}\n.content-type-badge.chart{background:#dbeafe;color:#1e40af}\n.content-type-badge.table{background:#fef3c7;color:#92400e}\n\n/* ===== TABLE PREVIEW (for table mode) ===== */\n.table-preview{overflow-x:auto;margin-top:1rem}\n.table-preview table{width:100%;border-collapse:collapse;font-size:.85rem}\n.table-preview th,.table-preview td{padding:.6rem .8rem;border:1px solid var(--border);text-align:left}\n.table-preview th{font-weight:600;font-size:.8rem}\n.styled-table-ft th{background:#FFF1E0;color:#33302E;border-color:#E8D5B5}\n.styled-table-ft td{border-color:#E8D5B5}\n.styled-table-economist th{background:#E3120B;color:#fff;border-color:#ccc}\n.styled-table-economist td{border-color:#ddd}\n.styled-table-bloomberg th{background:#1A1A2E;color:#00D26A;border-color:#333}\n.styled-table-bloomberg td{background:#0D0D1A;color:#E5E7EB;border-color:#333}\n.styled-table-minimal th{background:#f1f5f9;color:#374151;border-color:#e2e8f0}\n.styled-table-minimal td{border-color:#e2e8f0}\n\n/* ===== TOGGLE SWITCH ===== */\n.toggle-row{display:flex;align-items:center;gap:.75rem;margin:1rem 0;flex-wrap:wrap}\n.toggle-row label{font-size:.85rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.5rem}\n.toggle-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--primary)}\n\n/* ===== RESPONSIVE ===== */\n@media(max-width:640px){\n  .main{padding:1rem}\n  .panel{padding:1.25rem}\n  .meta-fields{grid-template-columns:1fr}\n  .config-row{flex-direction:column;align-items:stretch}\n  .config-row input[type=text]{width:100%}\n  .style-grid{grid-template-columns:1fr 1fr}\n  .stepper li{font-size:.65rem;padding:.5rem .25rem}\n}\n</style>\n</head>\n<body>\n\n<!-- HEADER -->\n<header class=\"app-header\">\n  <div>\n    <h1>\ud83d\udcca Chart Recreator</h1>\n    <div class=\"subtitle\">\u4e0a\u50b3\u5716\u8868 \u2192 AI \u63d0\u53d6\u6578\u64da \u2192 \u5c08\u696d\u98a8\u683c\u91cd\u88fd</div>\n  </div>\n  <button class=\"settings-toggle\" onclick=\"openSettings()\">\u2699\ufe0f \u8a2d\u5b9a</button>\n</header>
